name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Públicas — necesarias en build para SSG/SEO (valores de producción)
          NEXT_PUBLIC_APP_URL: https://vegalta.es
          NEXT_PUBLIC_SITE_URL: https://vegalta.es
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: 6a2702ec000b42a91782
          NEXT_PUBLIC_APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
